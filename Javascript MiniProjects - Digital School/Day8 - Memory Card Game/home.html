<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Card Game</title>

  <!-- Bootstrap 5 for quick styling -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Our custom styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ========== HEADER ========== -->
  <div class="container text-center my-4">
    <h1 class="title">🧠 Memory Card Game</h1>
    <p class="lead">Flip the cards and find all matching pairs!</p>

    <!-- ========== SCOREBOARD ========== -->
    <div class="d-flex justify-content-center gap-4 my-3 scoreboard">
      <div class="stat-box">
        <span class="stat-label">Moves</span>
        <span id="moveCount" class="stat-value">0</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">Pairs Found</span>
        <span id="pairsFound" class="stat-value">0</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">Time</span>
        <span id="timer" class="stat-value">0:00</span>
      </div>
    </div>

    <!-- Restart Button -->
    <button id="restartBtn" class="btn btn-warning btn-lg mb-3">🔄 Restart Game</button>
  </div>

  <!-- ========== GAME BOARD ========== -->
  <div class="container">
    <div id="gameBoard" class="game-board"></div>
  </div>

  <!-- ========== WIN MODAL ========== -->
  <div id="winModal" class="modal-overlay hidden">
    <div class="modal-content">
      <h2>🎉 You Won!</h2>
      <p>You completed the game in <strong id="finalMoves">0</strong> moves</p>
      <p>Your time: <strong id="finalTime">0:00</strong></p>
      <button id="playAgainBtn" class="btn btn-success btn-lg">Play Again</button>
    </div>
  </div>

  <!-- Our game script -->
  <script src="script.js"></script>
</body>
</html>
